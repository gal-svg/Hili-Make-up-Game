<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משחק האיפור של הילי דוד</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Heebo', sans-serif;
  background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh;
  color: white;
  direction: rtl;
}

/* ---- Upload Screen ---- */
#uploadScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.upload-title {
  font-size: 3.5rem;
  font-weight: 900;
  background: linear-gradient(90deg, #ff6eb4, #ff9ef4, #c7a7ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  text-align: center;
}
.upload-subtitle {
  font-size: 1.2rem;
  color: #c7a7ff;
  margin-bottom: 40px;
  text-align: center;
}
.upload-zone {
  width: 360px;
  height: 360px;
  border: 3px dashed #ff6eb4;
  border-radius: 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(255,110,180,0.05);
}
.upload-zone:hover, .upload-zone.dragover {
  background: rgba(255,110,180,0.15);
  border-color: white;
  transform: scale(1.02);
}
.upload-icon { font-size: 5rem; margin-bottom: 20px; }
.upload-text { font-size: 1.2rem; color: #ff9ef4; text-align: center; line-height: 1.7; }
#fileInput { display: none; }

/* ---- Game Screen ---- */
#gameScreen {
  display: none;
  height: 100vh;
  flex-direction: column;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,110,180,0.3);
  gap: 8px;
  height: 56px;
  flex-shrink: 0;
}
.topbar-title {
  font-size: 1.4rem;
  font-weight: 900;
  background: linear-gradient(90deg, #ff6eb4, #c7a7ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex: 1;
}
.btn {
  padding: 7px 14px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: 0.85rem;
  font-weight: 700;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.btn:hover { transform: scale(1.06); }
.btn:active { transform: scale(0.94); }
.btn-primary { background: linear-gradient(135deg, #ff6eb4, #c7a7ff); color: white; }
.btn-secondary { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.25); }
.btn-danger { background: rgba(255,80,80,0.25); color: #ff9999; border: 1px solid rgba(255,80,80,0.4); }

/* Main area */
.main-area { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 76px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  border-left: 1px solid rgba(255,110,180,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  gap: 4px;
  overflow-y: auto;
  flex-shrink: 0;
}
.cat-btn {
  width: 62px;
  min-height: 62px;
  border-radius: 14px;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  color: white;
  font-size: 0.6rem;
  text-align: center;
  gap: 3px;
  padding: 4px 2px;
}
.cat-btn .icon { font-size: 1.6rem; line-height: 1; }
.cat-btn:hover { background: rgba(255,110,180,0.2); border-color: rgba(255,110,180,0.5); transform: scale(1.05); }
.cat-btn.active { background: linear-gradient(135deg, rgba(255,110,180,0.35), rgba(199,167,255,0.35)); border-color: #ff6eb4; }

/* Canvas area */
.canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background: rgba(0,0,0,0.15);
}
.canvas-container {
  position: relative;
  box-shadow: 0 0 60px rgba(255,110,180,0.25);
  border-radius: 8px;
  overflow: hidden;
}
#photoCanvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
}
#makeupCanvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  cursor: crosshair;
}
#stickersLayer {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.sticker-item {
  position: absolute;
  cursor: move;
  user-select: none;
  pointer-events: all;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.sticker-delete {
  position: absolute;
  top: -8px;
  right: -8px;
  width: 18px;
  height: 18px;
  background: #ff4444;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  cursor: pointer;
  z-index: 10;
  border: 1px solid white;
}
.sticker-item:hover .sticker-delete { display: flex; }

/* Options panel */
.options-panel {
  width: 250px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  border-right: 1px solid rgba(255,110,180,0.2);
  padding: 14px;
  overflow-y: auto;
  flex-shrink: 0;
}
.panel-title {
  font-size: 1.1rem;
  font-weight: 700;
  color: #ff9ef4;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-label {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.55);
  margin-bottom: 7px;
  margin-top: 12px;
  letter-spacing: 0.03em;
}
.color-palette {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 6px;
}
.color-swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.15s;
  border: 2px solid transparent;
  position: relative;
  flex-shrink: 0;
}
.color-swatch:hover { transform: scale(1.25); }
.color-swatch.selected { border-color: white; transform: scale(1.25); }
.color-swatch.selected::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 13px;
  text-shadow: 0 0 4px rgba(0,0,0,0.9);
  display: grid;
  place-items: center;
}
.range-wrapper { display: flex; align-items: center; gap: 8px; }
.range-input {
  flex: 1;
  -webkit-appearance: none;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.18);
  outline: none;
  cursor: pointer;
}
.range-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ff6eb4, #c7a7ff);
  cursor: pointer;
  border: 2px solid white;
}
.range-value { font-size: 0.8rem; color: #ff9ef4; min-width: 34px; text-align: left; }
.eraser-btn {
  width: 100%;
  padding: 9px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: white;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: 0.95rem;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.eraser-btn:hover, .eraser-btn.active { background: rgba(255,220,80,0.2); border-color: #ffcc44; color: #ffcc44; }
.sticker-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}
.sticker-option {
  aspect-ratio: 1;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  cursor: pointer;
  transition: all 0.15s;
  border: 2px solid transparent;
}
.sticker-option:hover { background: rgba(255,110,180,0.3); transform: scale(1.1); }
.sticker-option.selected { border-color: #ff6eb4; background: rgba(255,110,180,0.3); }

/* Custom color picker */
.custom-color-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}
.custom-color-row input[type=color] {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 50%;
  padding: 2px;
  cursor: pointer;
  background: none;
}
.custom-color-label { font-size: 0.8rem; color: rgba(255,255,255,0.6); }

/* Sparkles */
@keyframes sparkle-out {
  0% { opacity: 1; transform: scale(1) translateY(0); }
  100% { opacity: 0; transform: scale(0.3) translateY(-30px); }
}
.sparkle-el {
  position: fixed;
  pointer-events: none;
  font-size: 18px;
  animation: sparkle-out 0.6s ease-out forwards;
  z-index: 9999;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
::-webkit-scrollbar-thumb { background: rgba(255,110,180,0.4); border-radius: 3px; }

/* Brush cursor preview */
#brushCursor {
  position: fixed;
  pointer-events: none;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.7);
  transform: translate(-50%, -50%);
  z-index: 999;
  display: none;
  mix-blend-mode: difference;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  #brushCursor { display: none !important; }
  #gameScreen { height: 100dvh; }

  .topbar { height: 48px; padding: 6px 10px; gap: 5px; overflow-x: auto; }
  .topbar-title { font-size: 1rem; flex-shrink: 0; }
  .btn { padding: 5px 10px; font-size: 0.75rem; flex-shrink: 0; }

  .main-area { flex-direction: column; }

  .canvas-area { order: 1; flex: 1; min-height: 0; }

  .options-panel {
    order: 2;
    width: 100%;
    height: auto;
    max-height: 150px;
    border-right: none;
    border-top: 1px solid rgba(255,110,180,0.25);
    padding: 8px 12px;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .panel-title { font-size: 0.95rem; margin-bottom: 7px; }
  .section-label { margin-top: 5px; margin-bottom: 4px; }

  .color-palette {
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .color-swatch { width: 34px; height: 34px; flex-shrink: 0; }

  .sticker-grid {
    grid-template-columns: repeat(20, 46px);
    grid-template-rows: 1fr;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .sticker-option { width: 46px; height: 46px; font-size: 1.7rem; }

  .sidebar {
    order: 3;
    width: 100%;
    height: 70px;
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 5px 8px;
    gap: 5px;
    border-left: none;
    border-top: 1px solid rgba(255,110,180,0.2);
    -webkit-overflow-scrolling: touch;
  }
  .cat-btn { width: 56px; min-height: 60px; flex-shrink: 0; font-size: 0.55rem; }
  .cat-btn .icon { font-size: 1.4rem; }

  .range-wrapper { gap: 6px; }
  .range-value { min-width: 26px; font-size: 0.75rem; }
  .eraser-btn { padding: 7px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<!-- Brush cursor -->
<div id="brushCursor"></div>

<!-- Upload Screen -->
<div id="uploadScreen">
  <div class="upload-title">✨ משחק האיפור של הילי דוד ✨</div>
  <div class="upload-subtitle">העלי תמונה של הילדה ותתחילי לאפר!</div>
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📸</div>
    <div class="upload-text">לחצי כאן להעלאת תמונה<br><span style="font-size:0.9rem;color:rgba(255,255,255,0.4)">או גרורי תמונה לכאן</span></div>
  </div>
  <input type="file" id="fileInput" accept="image/*">
  <p style="margin-top:18px;color:rgba(255,255,255,0.3);font-size:0.85rem">תומך ב-JPG, PNG, WebP, GIF</p>
</div>

<!-- Game Screen -->
<div id="gameScreen">
  <div class="topbar">
    <div class="topbar-title">✨ משחק האיפור של הילי דוד</div>
    <button class="btn btn-secondary" onclick="undo()" title="Ctrl+Z">↩ בטל</button>
    <button class="btn btn-secondary" onclick="redo()" title="Ctrl+Y">↪ חזור</button>
    <button class="btn btn-danger" onclick="clearAll()">🗑 נקה הכל</button>
    <button class="btn btn-primary" onclick="downloadResult()">💾 שמור תמונה</button>
    <button class="btn btn-secondary" onclick="newPhoto()">📷 תמונה חדשה</button>
  </div>
  <div class="main-area">
    <!-- Options panel (right side in RTL) -->
    <div class="options-panel" id="optionsPanel"></div>
    <!-- Canvas -->
    <div class="canvas-area">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="photoCanvas"></canvas>
        <canvas id="makeupCanvas"></canvas>
        <div id="stickersLayer"></div>
      </div>
    </div>
    <!-- Category sidebar (left side in RTL) -->
    <div class="sidebar" id="sidebar"></div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const CATEGORIES = [

  {

    colors:['#3D2B1F','#5C4033','#8B6914','#7B3F00','#4A3728','#2C1810','#6B4226','#9E7B5A','#C4A882','#000000','#1A0A00','#4A2800']
  },
  {
    id:'earrings', icon:'💎', name:'עגילים', type:'sticker',
    stickers:[
      {e:'💎',n:'יהלום'},{e:'⭕',n:'חישוק'},{e:'⭐',n:'כוכב'},{e:'🌙',n:'ירח'},
      {e:'🌸',n:'פרח'},{e:'❤️',n:'לב'},{e:'🦋',n:'פרפר'},{e:'🌺',n:'פרח אדום'},

      {e:'🎀',n:'פפיון'},{e:'🍓',n:'תות'},{e:'🦄',n:'חד קרן'},{e:'🌟',n:'כוכב זהב'},
      {e:'💠',n:'יהלום כחול'},{e:'🔴',n:'אדום'},{e:'🟡',n:'צהוב'},{e:'🟢',n:'ירוק'}

  },
  {

    stickers:[

      {e:'✨',n:'נצנצים'},{e:'🌈',n:'קשת בענן'},{e:'🦋',n:'פרפר'},{e:'🍀',n:'תלתן'},
      {e:'🎭',n:'מסכה'},{e:'💫',n:'ניצוץ'},{e:'🌟',n:'כוכב זהב'},{e:'🔮',n:'כדור קסם'},
      {e:'🪄',n:'שרביט קסמים'},{e:'🌙',n:'ירח'},{e:'🎪',n:'קישוט'},{e:'🪸',n:'אלמוג'}
    ]

// ============================================================
// STATE
// ============================================================
let selCat = CATEGORIES[0];
let selColor = CATEGORIES[0].colors[0];
let selSticker = null;
let brushSize = CATEGORIES[0].defaultSize;
let brushOpacity = CATEGORIES[0].defaultOpacity;
let isEraser = false;
let isDrawing = false;
let strokeAngle = 0;
let lastX = 0, lastY = 0;
let midX = 0, midY = 0;
let history = [];
let historyIdx = -1;
let stickers = [];
let stickerIdCnt = 0;
let stickerSize = 54;

let photoCanvas, photoCtx, makeupCanvas, makeupCtx;

// ============================================================
// INIT
// ============================================================
function initGame(imgSrc) {
  document.getElementById('uploadScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';

  photoCanvas = document.getElementById('photoCanvas');
  makeupCanvas = document.getElementById('makeupCanvas');
  photoCtx = photoCanvas.getContext('2d');
  makeupCtx = makeupCanvas.getContext('2d');

  const img = new Image();
  img.onload = () => {
    const maxW = window.innerWidth - 76 - 250 - 40;
    const maxH = window.innerHeight - 56 - 20;
    let w = img.naturalWidth, h = img.naturalHeight;
    const sc = Math.min(maxW / w, maxH / h, 1);
    w = Math.round(w * sc); h = Math.round(h * sc);

    photoCanvas.width = makeupCanvas.width = w;
    photoCanvas.height = makeupCanvas.height = h;
    const cont = document.getElementById('canvasContainer');
    cont.style.width = w + 'px';
    cont.style.height = h + 'px';

    photoCtx.drawImage(img, 0, 0, w, h);

    history = []; historyIdx = -1;
    stickers.forEach(s => s.el && s.el.remove());
    stickers = [];
    saveHistory();

    setupEvents();
    buildSidebar();
    selectCat(CATEGORIES[0]);
    setupKeyboard();
  };
  img.src = imgSrc;
}

// ============================================================
// SIDEBAR
// ============================================================
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('div');
    btn.className = 'cat-btn';
    btn.id = 'cat-' + cat.id;
    btn.innerHTML = `<span class="icon">${cat.icon}</span><span>${cat.name}</span>`;
    btn.onclick = () => selectCat(cat);
    sb.appendChild(btn);
  });
}

function selectCat(cat) {
  selCat = cat;
  if (cat.defaultSize) brushSize = cat.defaultSize;
  if (cat.defaultOpacity) brushOpacity = cat.defaultOpacity;
  isEraser = false;
  if (cat.colors) selColor = cat.colors[0];
  selSticker = null;

  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('cat-' + cat.id);
  if (btn) btn.classList.add('active');

  makeupCanvas.style.cursor = cat.type === 'sticker' ? 'pointer' : 'none';
  buildPanel(cat);
}

// ============================================================
// OPTIONS PANEL
// ============================================================
function buildPanel(cat) {
  const panel = document.getElementById('optionsPanel');

  if (cat.type === 'sticker') {
    panel.innerHTML = `
      <div class="panel-title">${cat.icon} ${cat.name}</div>
      <div class="section-label">בחרי מדבקה ולחצי על התמונה להנחה</div>
      <div class="sticker-grid">${cat.stickers.map((s,i)=>`
        <div class="sticker-option" id="so-${i}" title="${s.n}" onclick="pickSticker('${s.e}',${i})">${s.e}</div>
      `).join('')}</div>
      <div class="section-label">גודל מדבקה</div>
      <div class="range-wrapper">
        <span style="font-size:0.85rem">קטן</span>
        <input type="range" class="range-input" min="20" max="140" value="${stickerSize}"
          oninput="stickerSize=+this.value;document.getElementById('ssv').textContent=this.value">
        <span class="range-value" id="ssv">${stickerSize}</span>
      </div>
      <div style="height:12px"></div>
      <div class="section-label" style="color:rgba(255,255,255,0.4)">גרור מדבקות ל-X למחיקה</div>`;
  } else {
    const opsz = Math.round(brushOpacity * 100);
    panel.innerHTML = `
      <div class="panel-title">${cat.icon} ${cat.name}</div>
      <div class="section-label">צבע</div>
      <div class="color-palette">${cat.colors.map(c=>`
        <div class="color-swatch${c===selColor?' selected':''}" style="background:${c}" title="${c}" onclick="pickColor('${c}')"></div>
      `).join('')}</div>
      <div class="custom-color-row">
        <input type="color" id="customColorPicker" value="${selColor}" oninput="pickColor(this.value)" title="צבע מותאם אישית">
        <span class="custom-color-label">צבע מותאם אישית</span>
      </div>
      <div class="section-label">גודל מברשת</div>
      <div class="range-wrapper">
        <span style="font-size:0.85rem">קטן</span>
        <input type="range" class="range-input" min="1" max="100" value="${brushSize}"
          oninput="brushSize=+this.value;document.getElementById('bsv').textContent=this.value">
        <span class="range-value" id="bsv">${brushSize}</span>
      </div>
      <div class="section-label">שקיפות</div>
      <div class="range-wrapper">
        <span>👁️</span>
        <input type="range" class="range-input" min="5" max="100" value="${opsz}"
          oninput="brushOpacity=this.value/100;document.getElementById('opv').textContent=this.value+'%'">
        <span class="range-value" id="opv">${opsz}%</span>
      </div>
      <div style="height:14px"></div>
      <button class="eraser-btn${isEraser?' active':''}" id="eraserBtn" onclick="toggleEraser()">
        🧹 מחק
      </button>`;
  }
}

function pickColor(c) {
  selColor = c;
  isEraser = false;
  document.querySelectorAll('.color-swatch').forEach(el => {
    const bg = el.style.background;
    el.classList.toggle('selected', bg === c || el.title === c);
  });
  const cp = document.getElementById('customColorPicker');
  if (cp && c.startsWith('#') && c.length === 7) cp.value = c;
  updateCursor();
}

function pickSticker(emoji, idx) {
  selSticker = emoji;
  document.querySelectorAll('.sticker-option').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('so-' + idx);
  if (el) el.classList.add('selected');
}

function toggleEraser() {
  isEraser = !isEraser;
  const btn = document.getElementById('eraserBtn');
  if (btn) btn.classList.toggle('active', isEraser);
  updateCursor();
}

// ============================================================
// BRUSH CURSOR
// ============================================================
const cursorEl = document.getElementById('brushCursor');

function updateCursor() {
  if (selCat && selCat.type !== 'sticker') {
    const sz = brushSize * 2;
    cursorEl.style.width = sz + 'px';
    cursorEl.style.height = sz + 'px';
    cursorEl.style.borderColor = isEraser ? 'rgba(255,200,80,0.9)' : 'rgba(255,255,255,0.8)';
  }
}

document.addEventListener('mousemove', e => {
  if (!makeupCanvas) return;
  const rect = makeupCanvas.getBoundingClientRect();
  const inside = e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom;
  if (inside && selCat && selCat.type !== 'sticker') {
    cursorEl.style.display = 'block';
    cursorEl.style.left = e.clientX + 'px';
    cursorEl.style.top = e.clientY + 'px';
  } else {
    cursorEl.style.display = 'none';
  }
});

// ============================================================
// CANVAS EVENTS
// ============================================================
function setupEvents() {
  makeupCanvas.addEventListener('mousedown', onDown);
  makeupCanvas.addEventListener('mousemove', onMove);
  makeupCanvas.addEventListener('mouseup', onUp);
  makeupCanvas.addEventListener('mouseleave', onUp);
  makeupCanvas.addEventListener('click', onClick);
  makeupCanvas.addEventListener('touchstart', e => { e.preventDefault(); onDown(e.touches[0]); }, {passive:false});
  makeupCanvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0]); }, {passive:false});
  makeupCanvas.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, {passive:false});
}

function getPos(e) {
  const rect = makeupCanvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (makeupCanvas.width / rect.width),
    y: (e.clientY - rect.top) * (makeupCanvas.height / rect.height)
  };
}

function onClick(e) {
  if (selCat.type === 'sticker' && selSticker) {
    const p = getPos(e);
    placeSticker(selSticker, p.x, p.y);
  }
}

function onDown(e) {
  if (selCat.type === 'sticker') return;
  isDrawing = true;
  const p = getPos(e);
  lastX = midX = p.x;
  lastY = midY = p.y;
  paintAt(p.x, p.y);
}

function onMove(e) {
  if (!isDrawing || selCat.type === 'sticker') return;
  const p = getPos(e);
  const dx = p.x - lastX, dy = p.y - lastY;
  if (Math.hypot(dx, dy) > 0.5) strokeAngle = Math.atan2(dy, dx);
  paintStroke(lastX, lastY, p.x, p.y);
  lastX = p.x; lastY = p.y;
  updateCursor();
}

function onUp() {
  if (isDrawing) { isDrawing = false; saveHistory(); }
}

// ============================================================
// DRAWING
// ============================================================
function hexToRgb(hex) {
  const h = hex.replace('#','');
  const full = h.length === 3 ? h.split('').map(c=>c+c).join('') : h;
  return [parseInt(full.slice(0,2),16), parseInt(full.slice(2,4),16), parseInt(full.slice(4,6),16)];
}

function paintAt(x, y) {
  paintStroke(x, y, x, y);
}

function paintStroke(x1, y1, x2, y2) {
  const ctx = makeupCtx;
  const cat = selCat;
  if (isEraser) { eraseAt(x1, y1, x2, y2); return; }
  const [r,g,b] = hexToRgb(selColor);
  const dx = x2-x1, dy = y2-y1;
  const dist = Math.hypot(dx, dy);

  switch (cat.type) {
    case 'fanBrush': {
      const steps = Math.max(1, Math.ceil(dist / (brushSize * 0.1)));
      for (let i = 0; i <= steps; i++) {
        const t = i/steps;
        fanBrush(ctx, x1+dx*t, y1+dy*t, strokeAngle, r, g, b, brushSize, brushOpacity, cat.blendMode);
      }
      break;
    }
    case 'flatBrush': {
      const steps = Math.max(1, Math.ceil(dist / (brushSize * 0.07)));
      for (let i = 0; i <= steps; i++) {
        const t = i/steps;
        flatBrush(ctx, x1+dx*t, y1+dy*t, strokeAngle, r, g, b, brushSize, brushOpacity, cat.blendMode);
      }
      break;
    }
    case 'lipBrush': {
      const steps = Math.max(1, Math.ceil(dist / (brushSize * 0.1)));
      for (let i = 0; i <= steps; i++) {
        const t = i/steps;
        lipBrush(ctx, x1+dx*t, y1+dy*t, r, g, b, brushSize, brushOpacity);
      }
      break;
    }
    case 'roundBrush': {
      const steps = Math.max(1, Math.ceil(dist / (brushSize * 0.14)));
      for (let i = 0; i <= steps; i++) {
        const t = i/steps;
        roundBrush(ctx, x1+dx*t, y1+dy*t, r, g, b, brushSize, brushOpacity, cat.blendMode);
      }
      break;
    }
    case 'shimmerBrush': {
      const steps = Math.max(1, Math.ceil(dist / 5));
      for (let i = 0; i <= steps; i++) {
        const t = i/steps;
        shimmerBrush(ctx, x1+dx*t, y1+dy*t, r, g, b, brushSize, brushOpacity);
      }
      break;
    }
    case 'pen':
    default: {
      ctx.save();
      ctx.globalCompositeOperation = cat.blendMode || 'source-over';
      ctx.strokeStyle = `rgba(${r},${g},${b},${brushOpacity})`;
      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }
  }
}

// FAN BRUSH — סומק, ברונזר
// מדמה מברשת אבקה רחבה עם זיפים בודדים
function fanBrush(ctx, x, y, angle, r, g, b, size, opacity, blend) {
  ctx.save();
  ctx.globalCompositeOperation = blend || 'multiply';
  const perp = angle + Math.PI / 2;
  const numBristles = Math.floor(size * 0.55 + 10);

  for (let i = 0; i < numBristles; i++) {
    const t = i / (numBristles - 1);           // 0..1
    const offset = (t - 0.5) * size * 2.2;
    const gauss = Math.exp(-Math.pow((t - 0.5) * 2.8, 2));  // gaussian envelope
    const bx = x + Math.cos(perp) * offset;
    const by = y + Math.sin(perp) * offset;
    const radius = size * 0.45 * gauss;
    const bOpacity = opacity * (0.25 + Math.random() * 0.45) * gauss;
    if (bOpacity < 0.004 || radius < 0.5) continue;
    const g2 = ctx.createRadialGradient(bx, by, 0, bx, by, radius);
    g2.addColorStop(0,   `rgba(${r},${g},${b},${bOpacity.toFixed(3)})`);
    g2.addColorStop(0.6, `rgba(${r},${g},${b},${(bOpacity*0.4).toFixed(3)})`);
    g2.addColorStop(1,   `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(bx, by, radius, 0, Math.PI*2);
    ctx.fillStyle = g2;
    ctx.fill();
  }
  ctx.restore();
}

// FLAT BRUSH — צלליות, קונטור
// מברשת שטוחה, מתארכת לכיוון התנועה עם זיפים לאורך
function flatBrush(ctx, x, y, angle, r, g, b, size, opacity, blend) {
  ctx.save();
  ctx.globalCompositeOperation = blend || 'overlay';
  ctx.translate(x, y);
  ctx.rotate(angle);

  const w = size * 1.6;   // חצי-אורך לכיוון המשיכה
  const h = size * 0.6;   // חצי-רוחב מאונך

  // ליבת הצבע כאליפסה
  const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(w, h));
  grad.addColorStop(0,    `rgba(${r},${g},${b},${opacity})`);
  grad.addColorStop(0.4,  `rgba(${r},${g},${b},${(opacity*0.8).toFixed(3)})`);
  grad.addColorStop(0.7,  `rgba(${r},${g},${b},${(opacity*0.38).toFixed(3)})`);
  grad.addColorStop(0.9,  `rgba(${r},${g},${b},${(opacity*0.07).toFixed(3)})`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
  ctx.save();
  ctx.scale(w / h, 1);
  ctx.beginPath();
  ctx.arc(0, 0, h, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();

  // זיפים לרוחב — מדמים את המרקם של המברשת
  const numStreaks = Math.floor(size * 0.4);
  for (let i = 0; i < numStreaks; i++) {
    const by = (Math.random() - 0.5) * h * 1.6;
    const edgeFade = Math.max(0, 1 - Math.abs(by / (h * 0.8)));
    if (edgeFade <= 0) continue;
    const sOpacity = opacity * 0.07 * Math.random() * edgeFade;
    ctx.strokeStyle = `rgba(${r},${g},${b},${sOpacity.toFixed(3)})`;
    ctx.lineWidth = 0.5 + Math.random() * 0.9;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-w * edgeFade * 0.95, by);
    ctx.lineTo( w * edgeFade * 0.95, by);
    ctx.stroke();
  }
  ctx.restore();
}

// LIP BRUSH — שפתון, טינט
// מברשת שפתיים — כיסוי גבוה במרכז, קצוות רכים, ברק עדין
function lipBrush(ctx, x, y, r, g, b, size, opacity) {
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
  grad.addColorStop(0,    `rgba(${r},${g},${b},${opacity})`);
  grad.addColorStop(0.5,  `rgba(${r},${g},${b},${(opacity*0.92).toFixed(3)})`);
  grad.addColorStop(0.72, `rgba(${r},${g},${b},${(opacity*0.52).toFixed(3)})`);
  grad.addColorStop(0.88, `rgba(${r},${g},${b},${(opacity*0.14).toFixed(3)})`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  // ברק גלוס עדין בחלק העליון
  ctx.globalCompositeOperation = 'screen';
  const gGrad = ctx.createRadialGradient(x, y - size*0.22, 0, x, y, size*0.5);
  gGrad.addColorStop(0, `rgba(255,255,255,${(opacity*0.2).toFixed(3)})`);
  gGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(x, y - size*0.1, size*0.5, 0, Math.PI*2);
  ctx.fillStyle = gGrad;
  ctx.fill();
  ctx.restore();
}

// ROUND BRUSH — קונסילר
// מברשת עגולה צפופה לכיסוי
function roundBrush(ctx, x, y, r, g, b, size, opacity, blend) {
  ctx.save();
  ctx.globalCompositeOperation = blend || 'source-over';
  const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
  grad.addColorStop(0,    `rgba(${r},${g},${b},${opacity})`);
  grad.addColorStop(0.55, `rgba(${r},${g},${b},${(opacity*0.82).toFixed(3)})`);
  grad.addColorStop(0.78, `rgba(${r},${g},${b},${(opacity*0.38).toFixed(3)})`);
  grad.addColorStop(0.93, `rgba(${r},${g},${b},${(opacity*0.09).toFixed(3)})`);
  grad.addColorStop(1,    `rgba(${r},${g},${b},0)`);
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.restore();
}

// SHIMMER BRUSH — הדגשה
// הילה + ניצוצות מיקרו
function shimmerBrush(ctx, x, y, r, g, b, size, opacity) {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
  grad.addColorStop(0,   `rgba(${r},${g},${b},${(opacity*0.85).toFixed(3)})`);
  grad.addColorStop(0.4, `rgba(${r},${g},${b},${(opacity*0.55).toFixed(3)})`);
  grad.addColorStop(0.75,`rgba(${r},${g},${b},${(opacity*0.18).toFixed(3)})`);
  grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.fillStyle = grad;
  ctx.fill();
  const cGrad = ctx.createRadialGradient(x, y, 0, x, y, size*0.32);
  cGrad.addColorStop(0, `rgba(255,255,255,${(opacity*0.55).toFixed(3)})`);
  cGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(x, y, size*0.32, 0, Math.PI*2);
  ctx.fillStyle = cGrad;
  ctx.fill();
  for (let i = 0; i < 8; i++) {
    const a = Math.random()*Math.PI*2, d = Math.random()*size*0.88;
    ctx.beginPath();
    ctx.arc(x+Math.cos(a)*d, y+Math.sin(a)*d, Math.random()*1.6+0.3, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${(Math.random()*0.65+0.2).toFixed(2)})`;
    ctx.fill();
  }
  ctx.restore();
}

function eraseAt(x1, y1, x2, y2) {
  const ctx = makeupCtx;
  const dist = Math.hypot(x2-x1, y2-y1);
  const steps = Math.max(1, Math.ceil(dist / (brushSize * 0.3)));
  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const ix = x1 + (x2-x1)*t, iy = y1 + (y2-y1)*t;
    const grad = ctx.createRadialGradient(ix, iy, 0, ix, iy, brushSize);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(ix, iy, brushSize, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
  }
  ctx.restore();
}

// ============================================================
// STICKERS
// ============================================================
function placeSticker(emoji, x, y) {
  const id = ++stickerIdCnt;
  const sz = stickerSize;
  const el = document.createElement('div');
  el.className = 'sticker-item';
  el.id = 'se-' + id;
  el.style.cssText = `left:${x - sz/2}px;top:${y - sz/2}px;width:${sz}px;height:${sz}px;font-size:${sz*0.78}px`;
  el.innerHTML = `${emoji}<div class="sticker-delete" onclick="deleteSticker(${id})">✕</div>`;
  makeDraggable(el);
  document.getElementById('stickersLayer').appendChild(el);
  stickers.push({ id, emoji, el, sz });
  spawnSparkles(x + makeupCanvas.getBoundingClientRect().left, y + makeupCanvas.getBoundingClientRect().top);
}

function makeDraggable(el) {
  let dx = 0, dy = 0, sx = 0, sy = 0;
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('sticker-delete')) return;
    dx = e.clientX; dy = e.clientY;
    sx = parseInt(el.style.left); sy = parseInt(el.style.top);
    const mv = m => { el.style.left = sx + (m.clientX-dx) + 'px'; el.style.top = sy + (m.clientY-dy) + 'px'; };
    const up = () => { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
    document.addEventListener('mousemove', mv);
    document.addEventListener('mouseup', up);
    e.stopPropagation();
  });
}

function deleteSticker(id) {
  const idx = stickers.findIndex(s => s.id === id);
  if (idx !== -1) { stickers[idx].el.remove(); stickers.splice(idx, 1); }
}

// ============================================================
// HISTORY
// ============================================================
function saveHistory() {
  const data = makeupCtx.getImageData(0, 0, makeupCanvas.width, makeupCanvas.height);
  if (historyIdx < history.length - 1) history = history.slice(0, historyIdx + 1);
  history.push(data);
  historyIdx = history.length - 1;
  if (history.length > 40) { history.shift(); historyIdx--; }
}

function undo() {
  if (historyIdx > 0) {
    historyIdx--;
    makeupCtx.clearRect(0, 0, makeupCanvas.width, makeupCanvas.height);
    makeupCtx.putImageData(history[historyIdx], 0, 0);
  }
}

function redo() {
  if (historyIdx < history.length - 1) {
    historyIdx++;
    makeupCtx.clearRect(0, 0, makeupCanvas.width, makeupCanvas.height);
    makeupCtx.putImageData(history[historyIdx], 0, 0);
  }
}

function clearAll() {
  if (!confirm('האם למחוק את כל האיפור והמדבקות?')) return;
  makeupCtx.clearRect(0, 0, makeupCanvas.width, makeupCanvas.height);
  stickers.forEach(s => s.el && s.el.remove());
  stickers = [];
  saveHistory();
}

// ============================================================
// DOWNLOAD
// ============================================================
function downloadResult() {
  const out = document.createElement('canvas');
  out.width = photoCanvas.width;
  out.height = photoCanvas.height;
  const ctx = out.getContext('2d');
  ctx.drawImage(photoCanvas, 0, 0);
  ctx.drawImage(makeupCanvas, 0, 0);

  // Render stickers as emoji text on canvas
  stickers.forEach(s => {
    const l = parseInt(s.el.style.left);
    const t = parseInt(s.el.style.top);
    const sz = s.sz;
    ctx.font = `${sz * 0.78}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(s.emoji, l + sz/2, t + sz/2);
  });

  const link = document.createElement('a');
  link.download = 'makeup-selfie.png';
  link.href = out.toDataURL('image/png');
  link.click();
}

// ============================================================
// NEW PHOTO
// ============================================================
function newPhoto() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('uploadScreen').style.display = 'flex';
  document.getElementById('fileInput').value = '';
  cursorEl.style.display = 'none';
}

// ============================================================
// SPARKLES
// ============================================================
function spawnSparkles(cx, cy) {
  const emojis = ['✨','⭐','💫','🌟','💥'];
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle-el';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = (cx + (Math.random()-0.5)*70) + 'px';
    el.style.top  = (cy + (Math.random()-0.5)*70) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
function setupKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.ctrlKey && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
    if (e.key === 'e') toggleEraser();
  });
}

// ============================================================
// FILE UPLOAD
// ============================================================
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) { const r = new FileReader(); r.onload = ev => initGame(ev.target.result); r.readAsDataURL(f); }
});

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) {
    const r = new FileReader(); r.onload = ev => initGame(ev.target.result); r.readAsDataURL(f);
  }
});
</script>
